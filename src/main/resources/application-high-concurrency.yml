consumer:
    batchSize: ${CONSUMER_BATCH_SIZE:100}
    concurrent: true
    intervalMilliseconds: 500
    virtualThread:
        scheduler:
            parallelism: ${CONSUMER_VT_SCHEDULER_PARALLELISM:128}
            maxPoolSize: ${CONSUMER_VT_SCHEDULER_MAX_POOL_SIZE:512}
            minRunnable: ${CONSUMER_VT_SCHEDULER_MIN_RUNNABLE:32}
feign:
    client:
        config:
            default:
                connectTimeout: 30000
                readTimeout: 600000
    okhttp:
        enabled: true
hystrix:
    command:
        default:
            circuitBreaker:
                requestVolumeThreshold: 5000
                sleepWindowInMilliseconds: 5000
            execution:
                isolation:
                    thread:
                        timeoutInMilliseconds: 600000
                timeout:
                    enabled: true
    threadpool:
        default:
          allowMaximumSizeToDivergeFromCoreSize: true
          coreSize: 400                             # 从200增至400
          maximumSize: 1000                         # 从500增至1000
          maxQueueSize: 10000                       # 从5000增至10000
          queueSizeRejectionThreshold: 10000
scheduled:
    thread:
        pool: 2000
server:
    shutdown: graceful
    undertow:
        buffer-size: 2048
        buffers-per-region: 2048
        io-threads: 32
        worker-threads: 500
spring:
    cloud:
        openfeign:
            client:
                config:
                    default:
                        connectTimeout: 30000
                        readTimeout: 600000
    lifecycle:
        timeout-per-shutdown-phase: 60s
subWorkflowList:
    batchSize: ${SUB_WORKFLOW_LIST_BATCH_SIZE:200}
    concurrent: true
